services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      API_PORT: ${API_PORT}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS}
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_SCOPES: ${OIDC_SCOPES}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      # The server always stores SQLite at /data/bbtodo.sqlite, so mount /data.
      - bbtodo_sqlite:/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  bbtodo_sqlite:
