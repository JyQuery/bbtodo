name: bbtodo-ci

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      CLIENT_URL: http://web
      SESSION_SECRET: ci-session-secret-12345678901234567890
      OIDC_ISSUER: https://accounts.google.com
      OIDC_CLIENT_ID: bbtodo-ci
      OIDC_CLIENT_SECRET: ci-secret
      OIDC_SCOPES: openid profile email
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  smoke:
    image: curlimages/curl:8.18.0
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    command:
      - sh
      - -eu
      - -c
      - |
          curl --fail --silent --show-error http://server:3000/health
          curl --fail --silent --show-error http://web/healthz
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code} %{redirect_url}' http://web/docs)" = "308 http://web/docs/"
          curl --fail --silent --show-error http://web/docs/

  e2e:
    build:
      context: .
      dockerfile: ./e2e/Dockerfile
    environment:
      CI: "1"
      PLAYWRIGHT_BASE_URL: http://web
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
