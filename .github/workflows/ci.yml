name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run server tests
        run: npm test
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Run web tests
        run: npm test
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run e2e tests in CI compose stack
        run: docker compose -f docker-compose.ci.yml up --build --abort-on-container-exit --exit-code-from e2e e2e

      - name: Stop e2e CI stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes --remove-orphans

  docker-smoke:
    runs-on: ubuntu-latest
    needs:
      - server
      - web

    steps:
      - uses: actions/checkout@v6

      - name: Run internal-network smoke checks
        run: docker compose -f docker-compose.ci.yml up --build --abort-on-container-exit --exit-code-from smoke smoke

      - name: Stop CI stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes --remove-orphans

  publish:
    runs-on: ubuntu-latest
    needs:
      - server
      - web
      - e2e
      - docker-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - id: owner
        name: Normalize image owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: server-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/bbtodo-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          labels: ${{ steps.server-meta.outputs.labels }}
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}

      - id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/bbtodo-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          labels: ${{ steps.web-meta.outputs.labels }}
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}

      - id: all-in-one-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/bbtodo
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.all-in-one
          labels: ${{ steps.all-in-one-meta.outputs.labels }}
          push: true
          tags: ${{ steps.all-in-one-meta.outputs.tags }}
